<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Capture</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      color: #333;
    }
    h1 { font-size: 48px; margin-bottom: 0; color: #027FE5; }
    h2 { font-size: 24px; margin-top: 10px; }
    p { font-size: 18px; line-height: 1.5; }
    a { color: #027FE5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .back-home { 
      display: inline-block;
      background: #027FE5;
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      margin-top: 20px;
    }
    .back-home:hover {
      background: #0265b5;
      text-decoration: none;
    }
    .logo {
      max-width: 150px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <img src="./images/6478a21cf8143d8b5a3c13c2_Capture Log.svg" alt="Capture Logo" class="logo">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="./" class="back-home">Back to Home</a>
  
  <script>
    // Analytics for 404 page
    if (typeof gtag === 'function') {
      gtag('event', '404_error', {
        'event_category': 'error',
        'event_label': document.referrer || 'direct',
        'page_location': window.location.href
      });
    }
  </script>
</body>
</html>
