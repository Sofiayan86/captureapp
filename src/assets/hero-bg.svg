<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#027FE5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#49E9FF;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background pattern -->
  <rect width="100%" height="100%" fill="#1E1E1E"/>
  
  <!-- Abstract shapes -->
  <circle cx="650" cy="150" r="200" fill="url(#grad1)" opacity="0.5"/>
  <circle cx="700" cy="400" r="150" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Grid pattern -->
  <path d="M0,100 L800,100" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M0,200 L800,200" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M0,300 L800,300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M0,400 L800,400" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M0,500 L800,500" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <path d="M100,0 L100,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M200,0 L200,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M300,0 L300,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M400,0 L400,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M500,0 L500,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M600,0 L600,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M700,0 L700,600" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Abstract DNA-like pattern -->
  <path d="M600,50 Q650,75 600,100 Q550,125 600,150 Q650,175 600,200 Q550,225 600,250 Q650,275 600,300" 
        stroke="rgba(73,233,255,0.4)" stroke-width="2" fill="none"/>
  
  <path d="M630,50 Q680,75 630,100 Q580,125 630,150 Q680,175 630,200 Q580,225 630,250 Q680,275 630,300" 
        stroke="rgba(2,127,229,0.4)" stroke-width="2" fill="none"/>
